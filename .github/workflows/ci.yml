name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/capture/pnpm-lock.yaml

      - name: Build capture frontend (required by tauri::generate_context!)
        working-directory: apps/capture
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: fmt
        run: cargo fmt -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace

      - name: unit and integration tests
        run: cargo test --workspace -- --test-threads=1
        env:
          RUST_BACKTRACE: 1

  rust-coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/capture/pnpm-lock.yaml

      - name: Build capture frontend (required by tauri::generate_context!)
        working-directory: apps/capture
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --out Html --out Xml -- --test-threads=1
        env:
          RUST_BACKTRACE: 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            tarpaulin-report.html
            cobertura.xml

  verifier-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/verifier/pnpm-lock.yaml

      - name: install
        working-directory: apps/verifier
        run: pnpm install --frozen-lockfile

      - name: lint
        working-directory: apps/verifier
        run: pnpm lint

      - name: build
        working-directory: apps/verifier
        run: pnpm build

      - name: test
        working-directory: apps/verifier
        run: npx tsx tests/e2e.test.ts

  rust-e2e-degraded:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/capture/pnpm-lock.yaml

      - name: Build capture frontend (required by tauri::generate_context!)
        working-directory: apps/capture
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: build
        run: cargo build --workspace

      # The mlx-vlm sidecar requires Apple Silicon with mlx-vlm installed.
      # GitHub Actions macos-latest runners do not host the model or the Python
      # environment, so the live e2e is unavailable in CI. The test gracefully
      # skips when the sidecar is unreachable, so we run it to confirm the skip
      # path works and the build compiles the test target.
      - name: degraded e2e (skip path)
        run: cargo test -p witness-core --test day-4-e2e -- --nocapture
        env:
          RUST_BACKTRACE: 1

      # Run the Rust verifier round-trip tests that do not need the sidecar.
      - name: bundle round-trip tests
        run: cargo test -p witness-core --test bundle_roundtrip -- --nocapture

      - name: canonicalization tests
        run: cargo test -p witness-core --test canonicalization -- --nocapture

      - name: keystore tests
        run: cargo test -p witness-core --test keystore -- --nocapture

      - name: incident schema tests
        run: cargo test -p witness-core --test incident_schema -- --nocapture

  cross-platform-e2e:
    name: cross-platform-e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/capture/pnpm-lock.yaml

      - name: Build capture frontend (required by tauri::generate_context!)
        working-directory: apps/capture
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # Hermetic e2e exercises the same capture pipeline + seal + verify path
      # the real app uses, against the in-process witness-test-sidecar. No
      # real model is required, so this runs on every push without depending
      # on Apple Silicon or large GPUs. Closes the README's "CI limitations"
      # and "Cross-platform gaps" bullets.
      - name: hermetic capture-to-verify e2e
        run: cargo test -p witness-core --test fake-sidecar-e2e -- --nocapture
        env:
          RUST_BACKTRACE: 1

      - name: fingerprint registry tests
        run: cargo test -p witness-fingerprints -- --nocapture

      - name: fake sidecar unit tests
        run: cargo test -p witness-test-sidecar -- --nocapture

  em-dash-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: scan for em dashes
        run: |
          set +e
          find . -type f \( -name '*.md' -o -name '*.rs' -o -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.json' -o -name '*.toml' -o -name '*.py' \) -not -path './.git/*' -not -path './target/*' -not -path '*/node_modules/*' -not -path '*/dist/*' -exec grep -l $'\xe2\x80\x94' {} + > /tmp/em-dash-hits.txt
          if [ -s /tmp/em-dash-hits.txt ]; then
            echo "Em dash found in the following files:"
            cat /tmp/em-dash-hits.txt
            exit 1
          fi
          echo "No em dashes found."
