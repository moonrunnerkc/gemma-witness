# cargo-deny configuration. CI runs `cargo deny check advisories bans sources`
# on every push and PR (audit S-3). Update this file when a new dependency
# legitimately requires a license, source, or version-range exception.

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[licenses]
# Closed list of accepted licenses. Add new entries deliberately; do not
# loosen on a one-off basis.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "0BSD",
  "MPL-2.0",
  "BSL-1.0",
  "OpenSSL",
]
confidence-threshold = 0.8
